name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

# Cancel in-progress runs for the same ref when a new push lands.
# Each PR / branch gets its own group so concurrent unrelated work is
# unaffected.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Job-name convention: `<Tool> (PHP X.Y[, Magento Z.A.B])`.
# Tool name first so checks group naturally in the UI.

jobs:
  # Discovers the current Magento support window from upstream so the
  # PHPStan / DI-compile / lint matrices track Adobe's lifecycle without
  # hand-maintenance. `dev/magento-support-matrix.sh` is the single
  # source of truth for which Magento × PHP combinations CI exercises.
  discover-magento-matrix:
    name: Discover Magento support matrix
    runs-on: ${{ vars.RUNNER_STANDARD }}
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      php_lint_matrix: ${{ steps.gen.outputs.php_lint_matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          matrix=$(./dev/magento-support-matrix.sh --emit-matrix)
          php_lint_matrix=$(./dev/magento-support-matrix.sh --emit-php-lint-matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "php_lint_matrix=$php_lint_matrix" >> "$GITHUB_OUTPUT"
          echo "Generated PHPStan / DI-compile matrix:"
          echo "$matrix" | jq .
          echo "Generated PHP lint matrix:"
          echo "$php_lint_matrix" | jq .

  lint:
    name: Lint (PHP ${{ matrix.php }})
    needs: discover-magento-matrix
    runs-on: ${{ vars.RUNNER_STANDARD }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-magento-matrix.outputs.php_lint_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none
      - name: Lint PHP files
        # Test/ is excluded — tests are dev-only and use newer syntax
        # than the merchant runtime. The phpunit matrix already
        # exercises Test/ on the supported PHP minors.
        run: |
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './Test/*' \
            -print0 | xargs -0 -n1 -P4 php -l > /dev/null

  codesniffer:
    name: Codesniffer
    runs-on: ${{ vars.RUNNER_STANDARD }}
    steps:
      - uses: actions/checkout@v6
      - name: Run codesniffer
        run: |
          docker run \
            --volume "$(pwd)/:/app/workdir" \
            michielgerritsen/magento-coding-standard:latest \
            --severity=6

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    needs: discover-magento-matrix
    runs-on: ${{ vars.RUNNER_STANDARD }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-magento-matrix.outputs.php_lint_matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          # PHPUnit 10.5 supports PHP 8.1-8.4. If a future PHP minor
          # (e.g. 8.5) enters the support window and PHPUnit 10.5 has
          # not been updated to cover it, bump this pin to 11.x.
          tools: phpunit:10.5

      - name: Run tests with coverage
        run: phpunit --coverage-clover coverage.xml --coverage-text

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-php${{ matrix.php }}
          path: coverage.xml
          if-no-files-found: warn

  phpstan:
    name: PHPStan (PHP ${{ matrix.php }}, Magento ${{ matrix.magento }})
    needs: discover-magento-matrix
    runs-on: ${{ vars.RUNNER_STANDARD }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-magento-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Start Magento docker container
        run: |
          docker run --detach --name magento-project-community-edition \
            michielgerritsen/magento-project-community-edition:${{ matrix.php_image }}-magento${{ matrix.magento }}

      - name: Upload tracked source into container
        # Ship only tracked files — avoids leaking .git/, dotfiles,
        # or any untracked working-tree state into the CI container.
        # `git ls-files | tar` is preferred over `git archive` here
        # because the latter honours .gitattributes export-ignore
        # and would strip phpstan.neon / phpunit.xml / Test/ which CI
        # needs but the release zip does not.
        run: |
          docker exec magento-project-community-edition mkdir -p /data/extensions/magento-plugin
          git ls-files -z | tar --null -cf - -T - | docker exec -i magento-project-community-edition tar -x -C /data/extensions/magento-plugin

      - name: Install extension from uploaded source
        run: |
          docker exec magento-project-community-edition \
            composer config repositories.local path '/data/extensions/*'
          docker exec magento-project-community-edition \
            composer require 'two-inc/magento2:*@dev' --no-plugins

      - name: Activate extension
        run: |
          docker exec magento-project-community-edition ./retry \
            "php bin/magento module:enable Two_Gateway && php bin/magento setup:upgrade && php bin/magento setup:di:compile"

      - name: Run PHPStan
        run: |
          docker exec magento-project-community-edition /bin/bash -c \
            "./vendor/bin/phpstan analyse --no-progress -c /data/extensions/*/phpstan.neon /data/extensions"

  di-compile:
    name: DI compile (PHP ${{ matrix.php }}, Magento ${{ matrix.magento }})
    needs: discover-magento-matrix
    runs-on: ${{ vars.RUNNER_STANDARD }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover-magento-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Start Magento docker container
        run: |
          docker run --detach --name magento-project-community-edition \
            michielgerritsen/magento-project-community-edition:${{ matrix.php_image }}-magento${{ matrix.magento }}

      - name: Upload tracked source into container
        # Ship only tracked files — avoids leaking .git/, dotfiles,
        # or any untracked working-tree state into the CI container.
        # `git ls-files | tar` is preferred over `git archive` here
        # because the latter honours .gitattributes export-ignore
        # and would strip phpstan.neon / phpunit.xml / Test/ which CI
        # needs but the release zip does not.
        run: |
          docker exec magento-project-community-edition mkdir -p /data/extensions/magento-plugin
          git ls-files -z | tar --null -cf - -T - | docker exec -i magento-project-community-edition tar -x -C /data/extensions/magento-plugin

      - name: Install extension from uploaded source
        run: |
          docker exec magento-project-community-edition \
            composer config repositories.local path '/data/extensions/*'
          docker exec magento-project-community-edition \
            composer require 'two-inc/magento2:*@dev' --no-plugins

      - name: Run setup:di:compile
        run: |
          docker exec magento-project-community-edition ./retry \
            "php bin/magento setup:di:compile"

      # ABN-423 M3: install-time smoke test. Catches the full
      # ABN-415-class regression surface in one sequence: DI scope
      # (compile picks up plugins from etc/di.xml, etc/adminhtml/di.xml,
      # etc/crontab/di.xml), Setup/Recurring.php firing (cache:flush
      # auto-runs as part of setup:upgrade), structure cache rebuild,
      # and the brand admin form synthesis emitting the `payment/
      # two_payment/title` default from etc/config.xml. A regression
      # in any of these surfaces as an empty or error-containing
      # config:show output.
      - name: Install-time smoke (ABN-423 M3)
        run: |
          docker exec magento-project-community-edition ./retry \
            "php bin/magento module:enable Two_Gateway && php bin/magento setup:upgrade && php bin/magento cache:flush"
          # Round-trip a config:set/config:show on a default-bearing path.
          # config:set writes to core_config_data, which forces Structure
          # to resolve `payment/two_payment/title` end-to-end: DI-graph
          # bootstrap → Reader::read → SynthesiseBrandAdminForm (the
          # ABN-415 regression surface) → Element resolution. A failure
          # anywhere in that chain surfaces here as a non-zero exit or
          # an error/exception trace in stderr.
          set -o pipefail
          docker exec magento-project-community-edition \
            php bin/magento config:set payment/two_payment/title 'CI smoke' 2>&1 | tee /tmp/set.log
          out=$(docker exec magento-project-community-edition \
            php bin/magento config:show payment/two_payment/title 2>&1)
          echo "config:show output: $out"
          if echo "$out" | grep -qiE 'error|exception|fatal'; then
            echo "::error::Smoke test failed: config:show returned an error."
            echo "Likely causes: DI scope drift (see ABN-415), Structure cache poisoning,"
            echo "or Setup/Recurring.php failed to clear the config cache."
            exit 1
          fi
          if ! echo "$out" | grep -q 'CI smoke'; then
            echo "::error::Smoke test failed: config round-trip didn't surface the set value."
            exit 1
          fi

  jest:
    name: Jest (Node 20)
    runs-on: ${{ vars.RUNNER_STANDARD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run test:js
